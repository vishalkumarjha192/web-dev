<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Email Password Validator</title>
  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f3f4f6;
}

.container{
  background:white;
  padding:30px;
  width:320px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.input-group{
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
}

label{
  margin-bottom:5px;
}

input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:4px;
}

input:focus{
  outline:none;
  border-color:#6366f1;
}

button{
  width:100%;
  padding:10px;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

button:hover{
  background:#4f46e5;
}

.error{
  color:red;
  font-size:12px;
}
  </style>
</head>

<body>

  <div class="container">
    <h2>Login Form</h2>

    <form autocomplete="off" id="loginForm">
      <div class="input-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email">
        <small class="error" id="emailError"></small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <small class="error" id="passwordError"></small>
      </div>

      <button type="submit">Submit</button>
    </form>
    <div id="resultMessage"></div>
  </div>

</body>
<script src="email_password_valid.js"></script>

</html>
